name: Ping URLs Daily

on:
  schedule:
    - cron: "*/10 * * * *"  # runs every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping URLs
        run: |
          curl https://lanka-property-api.onrender.com/
          curl https://lankaestimate.streamlit.app/
